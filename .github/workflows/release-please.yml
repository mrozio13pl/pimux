name: Release Please

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write
    issues: write
    actions: write

jobs:
    release-please:
        runs-on: ubuntu-latest
        steps:
            - name: Create release PR or GitHub release
              id: release
              uses: googleapis/release-please-action@v4
              with:
                  config-file: release-please-config.json
                  manifest-file: .release-please-manifest.json

            - name: Build and attach release assets
              if: steps.release.outputs.release_created == 'true'
              env:
                  GH_TOKEN: ${{ github.token }}
              run: gh workflow run "Release builds" --ref "${{ steps.release.outputs.tag_name }}"
